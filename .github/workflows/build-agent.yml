name: Build PC Agent binaries

# Triggered when a version tag is pushed. Tag name format: v1.0.0, v1.2.3-rc1, etc.
on:
  push:
    tags:
      - "v*"
  # Allow manual dispatch from the Actions tab for testing.
  workflow_dispatch:

permissions:
  contents: write  # needed to create the GitHub Release

# Pinned LibreHardwareMonitor release. Bump this to upgrade the bundled
# sensor library — its DLL ships inside the Windows agent so users don't
# have to install HWiNFO64 (or anything else) to see hardware metrics.
env:
  LHM_VERSION: "0.9.4"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: pc-agent.exe
            release_name: pc-agent-windows.exe
          - os: macos-latest
            artifact_name: pc-agent
            release_name: pc-agent-macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Stamp release tag into AGENT_VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        # Rewrite the AGENT_VERSION constant in pc_agent.py to match the git
        # tag that triggered this build (stripping the leading 'v'). This way
        # the version the agent reports at runtime can never drift from the
        # version of the GitHub Release the user downloaded.
        # Runs after setup-python so we use the explicitly-pinned interpreter.
        run: |
          python - <<'PY'
          import os, re, pathlib, sys
          tag = os.environ["RELEASE_TAG"].lstrip("v")
          p = pathlib.Path("pc_agent.py")
          src = p.read_text()
          new, n = re.subn(
              r'^AGENT_VERSION\s*=\s*"[^"]*"',
              f'AGENT_VERSION = "{tag}"',
              src, count=1, flags=re.M,
          )
          if n != 1:
              sys.exit("ERROR: could not find AGENT_VERSION line in pc_agent.py")
          p.write_text(new)
          print(f"Stamped AGENT_VERSION = {tag}")
          PY

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller psutil flask flask-cors

      - name: Install pythonnet (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        # pythonnet bridges Python <-> .NET so we can call into
        # LibreHardwareMonitorLib.dll. Only meaningful on Windows.
        run: |
          python -m pip install "pythonnet>=3.0.3"

      - name: Download LibreHardwareMonitorLib (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        # Pulls the net472 build of LHM and copies just the library DLLs into
        # vendor/ where the PyInstaller spec picks them up. We use net472 so
        # the bundled .NET Framework on Windows 10 1803+ is enough — no extra
        # runtime install for end users.
        run: |
          set -euo pipefail
          mkdir -p vendor lhm-extracted
          curl -fsSL -o lhm.zip "https://github.com/LibreHardwareMonitor/LibreHardwareMonitor/releases/download/v${LHM_VERSION}/LibreHardwareMonitor-net472.zip"
          unzip -q -o lhm.zip -d lhm-extracted
          # Copy LHM core lib + its HidSharp dependency.
          cp lhm-extracted/LibreHardwareMonitorLib.dll vendor/
          cp lhm-extracted/HidSharp.dll vendor/
          ls -la vendor/

      - name: Build with PyInstaller
        run: pyinstaller build/pc-agent.spec --clean --noconfirm

      - name: Rename artifact for release
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ matrix.artifact_name }}" "release/${{ matrix.release_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: release/${{ matrix.release_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    # Only publish when triggered by a tag push, not workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Flatten artifact directory
        run: |
          mkdir -p flat
          find release -type f -exec cp {} flat/ \;
          ls -la flat/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flat/pc-agent-windows.exe
            flat/pc-agent-macos
          generate_release_notes: true
          fail_on_unmatched_files: true
